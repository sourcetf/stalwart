name: "CI"

on:
  workflow_dispatch:
    inputs:
      Release:
        required: false
        default: false
        type: boolean
  push:
    tags: ["v*.*.*"]

env:
  CARGO_TERM_COLOR: always
  AWS_LC_SYS_PREBUILT_NASM: 1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    permissions:
      id-token: write
      contents: write
      attestations: write
    name: Build / x86_64-unknown-linux-musl
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust targets and cross
        run: |
          rustup target add x86_64-unknown-linux-musl
          cargo install cross --git https://github.com/cross-rs/cross --locked

      - name: Build with cross
        run: |
          cross build --release --target x86_64-unknown-linux-musl -p stalwart --no-default-features --features "sqlite postgres mysql rocks s3 redis azure nats enterprise"
          mkdir -p artifacts
          mv ./target/x86_64-unknown-linux-musl/release/stalwart ./artifacts/stalwart

      - name: Upload Artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifact-x86_64-unknown-linux-musl
          path: artifacts/stalwart

  release:
    name: Release
    permissions:
      id-token: write
      contents: write
      attestations: write
    if: github.event_name == 'push' || inputs.Release
    needs: [linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/checkout@v6.0.2

      - name: Download Artifacts
        uses: actions/download-artifact@v8
        with:
          path: archive
          pattern: artifact-*

      - name: Compress
        run: |
          set -eux
          mkdir -p dist
          tar -czf dist/stalwart-x86_64-unknown-linux-musl.tar.gz -C archive stalwart

      - name: Attest binary
        id: attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/*.tar.gz

      - name: Use cosign to sign
        uses: sigstore/gh-action-sigstore-python@v3.3.0
        with:
          inputs: dist/*.tar.gz

      - name: Build release body
        run: |
          if [ "${{ startsWith(github.ref, 'refs/tags/') }}" = "true" ]; then
            awk '/^## \[/{c++} c==1' CHANGELOG.md > release_body.md
            echo "" >> release_body.md
          else
            : > release_body.md
          fi
          cat >> release_body.md <<EOF
          <hr />

          ### Check binary attestation [here](${{ steps.attest.outputs.attestation-url }})
          EOF

      - name: Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/*.tar.gz
            dist/*.sigstore.json
          prerelease: ${{!startsWith(github.ref, 'refs/tags/') || null}}
          tag_name: ${{!startsWith(github.ref, 'refs/tags/') && 'nightly' || null}}
          draft: ${{ startsWith(github.ref, 'refs/tags/') || null }}
          body_path: release_body.md

  publish:
    name: Publish release
    needs: [linux, release]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Un-draft release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${{ github.ref_name }}" --draft=false --latest --repo "${{ github.repository }}"

  cleanup:
    name: Cleanup failed release
    needs: [linux, release]
    if: failure() && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Delete draft release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete "${{ github.ref_name }}" --yes --cleanup-tag --repo "${{ github.repository }}" || true
